plan_id: ad-hoc
objective: Research current search bar implementation vs Pixiv target, identify split layout causes, and map edit surfaces.
focus_area: frontend search bar (AppSearchBar/AppTopBarSearchControls)
created_at: "2026-05-25"
created_by: gem-researcher
status: completed

tldr: |
  - Search input UI is implemented in AppSearchBar and composed into AppTopBarSearchControls alongside a separate inline scope menu button.
  - The split appearance is driven by separate DOM blocks (AppSearchBar + inline-menu button) and independent styling (bordered search shell vs icon button).
  - Search history panel is absolutely positioned inside AppSearchBar and is not part of the split layout; search results page does not alter the top bar search shell.
  - No global CSS overrides for search bar were found; all styling is scoped in component SFCs.

