patterns_found:
  - category: architecture
    pattern: "Top bar search controls are composed from two adjacent components"
    description: AppSearchBar is rendered beside an inline scope menu button inside a flex container, producing a visually split search control.
    examples:
      - file: AppTopBarSearchControls.vue
        location: AppTopBarSearchControls.vue:35
        snippet: "<div class=\"search-unit\">\n  <AppSearchBar class=\"top-search\" ... />\n  <div class=\"inline-menu\">"
    prevalence: common

  - category: structure
    pattern: "Search bar visuals are self-contained in AppSearchBar"
    description: Borders, background, padding, and focus behavior are all scoped to AppSearchBar; no external CSS overrides were found.
    examples:
      - file: AppSearchBar.vue
        location: AppSearchBar.vue:243
        snippet: ".search-shell--compact { border: 1px solid rgba(0, 0, 0, 0.08); }"
    prevalence: common

  - category: structure
    pattern: "Search history panel anchored to search shell"
    description: History panel is positioned absolutely under AppSearchBar and does not include the inline scope menu button.
    examples:
