plan_id: ad-hoc
objective: Locate artwork upload UI/logic in frontend, related backend endpoints, and AI detect usage in AI view.
focus_area: artwork_upload_ai_detect
created_at: "2026-05-21"
created_by: gem-researcher
status: completed

tldr: |
  - Frontend upload entry point is UploadArtworkView with dedicated upload components and a Pinia store that posts FormData to the artworks API.
  - Backend upload endpoint is POST /api/artworks with multer disk storage, handled by createArtwork controller.
  - AI detect is wired in AIView to POST /api/ai/detect-image via the shared api client; no evidence of AI detect in the upload flow itself.

research_metadata:
  methodology: hybrid retrieval: semantic_search + grep_search, targeted read_file on upload/AI routes, controllers, store, and view files
  scope: frontend upload view/components/store/api client; backend artwork/AI routes and controllers; router wiring
  confidence: medium
  coverage: 72
  decision_blockers: 0
  research_blockers: 0

