        location: UploadArtworkView.vue:289
        snippet: "await artworkStore.submitArtwork({ ... })"
      - file: frontend/src/stores/artwork.store.js
        location: artwork.store.js:33
        snippet: "const formData = new FormData()"
      - file: frontend/src/services/api.js
        location: api.js:69
        snippet: "export const createArtwork = (formData) => api.post('/artworks', formData)"
      - file: backend/routes/artwork.routes.js
        location: artwork.routes.js:63
        snippet: ".post(protect, upload.array('images', 10), createArtwork)"
    prevalence: common

  - category: structure
    pattern: Upload UI split into focused child components
    description: Upload view composes hero (file inputs), content details, tags, and publication settings sections.
    examples:
