patterns_found:
  - category: structure
    pattern: initial-based thread avatar
    description: UI uses first-letter avatar in thread list regardless of backend avatar field.
    examples:
      - file: frontend/src/views/MessagesView.vue
        location: MessagesView.vue:524-532
        snippet: "<div class=\"thread-avatar\">{{ (thread.peer?.username || 'U').charAt(0).toUpperCase() }}</div>"
    prevalence: common
  - category: architecture
    pattern: minimal message API surface
    description: Message module exposes list/create/mark-read only.
    examples:
      - file: backend/controllers/message.controller.js
        location: message.controller.js:6-92
        snippet: "getMyMessages / createMessage / markMessageRead"
      - file: backend/routes/message.routes.js
        location: message.routes.js:1-12
        snippet: "GET /messages, POST /messages, PATCH /messages/:id/read"
    prevalence: common
  - category: structure
    pattern: no presence/typing UI
    description: No UI elements or state for typing indicator or online presence in messaging view or top bar panel.
    examples:
      - file: frontend/src/views/MessagesView.vue
        location: MessagesView.vue:546-705
        snippet: "Header + thread list + message flow + compose only"
    prevalence: common
  - category: structure
    pattern: responsive stack without navigation control
    description: Mobile breakpoint stacks sidebar and chat, but no UI to collapse/return to list.
    examples:
      - file: frontend/src/views/MessagesView.css
        location: MessagesView.css:801-840
        snippet: "grid-template-columns: 1fr; thread-list-pane max-height"
    prevalence: occasional

