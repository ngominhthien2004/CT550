plan_id: adhoc-messages-issues-2026-05-27
objective: Verify reported messaging UI/backend issues in codebase
focus_area: messaging
created_at: "2026-05-27"
created_by: gem-researcher
status: completed

tldr: |
  - Messages list uses an initial-based avatar even though backend populates avatar fields.
  - No typing indicator or online/presence signals in frontend or backend message flows.
  - Mobile layout stacks sidebar and chat without a dedicated back control to return to list.
  - No search or delete message UI or backend endpoints in the current messaging module.

