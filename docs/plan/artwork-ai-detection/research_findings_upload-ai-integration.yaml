plan_id: artwork-ai-detection
objective: Locate artwork upload flow, tag assignment, and /ai route usage to identify integration touchpoints for AI detection and warning messaging.
focus_area: upload-ai-integration
created_at: "2026-05-21"
created_by: gem-researcher
status: completed

tldr: |
  - Artwork upload uses multipart /api/artworks with multer disk storage and createArtwork handles image paths and tag normalization.
  - Tags are normalized to lowercase with underscores, created on demand, and usageCount is incremented during upload.
  - AI endpoints are mounted at /api/ai with /ai/chat and /ai/detect-image used by the AIView frontend.
  - Upload UI includes an aiGenerated radio setting in publication settings but current submit payload does not include it.
  - AI detection service uses HuggingFace inference and returns isAI/confidence/reason for a single image.

