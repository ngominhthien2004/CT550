patterns_found:
  - category: architecture
    pattern: routes -> controllers -> models
    description: Express routes map to controllers that read/write Mongoose models.
    examples:
      - file: backend/routes/artwork.routes.js
        location: backend/routes/artwork.routes.js:63
        snippet: ".post(protect, upload.array('images', 10), createArtwork)"
    prevalence: common
  - category: structure
    pattern: upload path derived from user and type
    description: Uploads stored under public/uploads/{userId}/{type} and URL normalized to /uploads/... in controller.
    examples:
      - file: backend/routes/artwork.routes.js
        location: backend/routes/artwork.routes.js:12
        snippet: "return path.join('public', 'uploads', userId, artworkType);"
    prevalence: common
  - category: naming
    pattern: tag normalization
    description: Tags are normalized by trimming, removing leading #, and replacing whitespace with underscores.
    examples:
      - file: backend/controllers/artwork.controller.js
        location: backend/controllers/artwork.controller.js:7
        snippet: ".replace(/\s+/g, '_')"
    prevalence: common
  - category: architecture
    pattern: AI detection via dedicated endpoint
    description: AI detection is exposed as /api/ai/detect-image with memoryStorage and a single image file.
    examples:
      - file: backend/routes/ai.routes.js
        location: backend/routes/ai.routes.js:18
        snippet: "router.post('/detect-image', upload.single('image'), detectAIImage);"
    prevalence: occasional

