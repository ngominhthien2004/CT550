plan_id: artwork-ai-detection
objective: "Integrate AI detection into artwork upload using existing /api/ai/detect-image, add configurable threshold, auto-tag AI, and show warning in upload UI with validation."
created_at: "2026-05-21"
created_by: gem-planner
status: pending_approval
research_confidence: medium

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 2
  risk_score: medium

tldr: |
  Backend-first: extend upload controller to call /api/ai/detect-image, read AI threshold from env/config, auto-apply AI tag, and return detection info.
  Frontend: surface warning below preview and auto-tag in UI based on backend response and finalized contract.
  Validation: minimal API smoke + Playwright upload flow check; no new libraries.
open_questions:
  - "Finalize the warning message copy for the upload UI (or confirm placeholder copy acceptance)."

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "AI detection slows or fails during upload, causing timeouts or failed uploads."
      likelihood: medium
      impact: high
      mitigation: "Add safe timeout and fallback behavior; do not block upload on detection failure and return warning metadata when available."
    - scenario: "Tag normalization mismatch causes duplicate AI tag variants."
      likelihood: medium
      impact: medium
      mitigation: "Reuse existing tag normalization helper and ensure single canonical tag name."
  assumptions:
    - "/api/ai/detect-image is stable and returns confidence for a single image."
    - "Upload flow can return additional metadata without breaking current clients."
    - "AI detection threshold input may be percent (0..100) or float (0..1) and will be normalized to 0..1 in config/controller."
    - "AI detection runs against a single, explicit target image (primary image) even when multiple images are uploaded."
    - "Detection requests use a configurable timeout with a default value."

implementation_specification:
  code_structure: "Keep routes -> controllers -> models; extend upload controller to call ai service and tag logic; frontend uses store + view to show warning and tag."
  affected_areas:
    - "backend/controllers/artwork.controller.js"
    - "backend/config/env.js"
    - "backend/routes/ai.routes.js (unchanged, contract reference only)"
    - "frontend/src/views/UploadArtworkView.vue"
    - "frontend/src/stores/artwork.store.js"
    - "frontend/src/services/api.js"
  component_details:
    - component: "Upload controller AI detection"
      responsibility: "Call /api/ai/detect-image during upload for the primary image (explicit target when multiple images exist), compare confidence to threshold (normalized 0..1), auto-apply canonical AI tag, and return detection metadata including canonicalTag + tagApplied."
      interfaces:
        - "POST /api/artworks response includes aiDetection { confidence, aboveThreshold, tagApplied, canonicalTag }"
    - component: "AI threshold config"
      responsibility: "Read AI detection threshold from env/config (accept percent 0..100 or float 0..1), normalize to 0..1, and expose to upload controller."
      interfaces:
        - "config.aiDetectionThreshold (normalized 0..1)"
    - component: "AI detection timeout config"
      responsibility: "Read AI detection timeout (ms) from env/config with a default value and apply to detection request to avoid blocking uploads."
      interfaces:
        - "config.aiDetectionTimeoutMs"
    - component: "Upload UI warning"
      responsibility: "Display warning under image preview when aiDetection.aboveThreshold is true, and auto-add AI tag to UI list using aiDetection.tagApplied + aiDetection.canonicalTag without duplicates."
      interfaces:
        - "artwork.store submitArtwork returns aiDetection metadata (tagApplied + canonicalTag)"
  dependencies:
    - component: "Upload controller AI detection"
      relationship: "Uses Tag model and tag normalization helper to apply AI tag."
    - component: "Upload UI warning"
      relationship: "Consumes upload response aiDetection contract and tags list updates."
  integration_points:
    - "POST /api/artworks upload flow"
    - "POST /api/ai/detect-image for detection"

contracts:
  - from_task: T1
    to_task: T2
    interface: "Upload response aiDetection metadata includes tagApplied + canonicalTag"
    format: "JSON: { aiDetection: { confidence: number, aboveThreshold: boolean, tagApplied: boolean, canonicalTag: string } }"
  - from_task: T1
    to_task: T2
    interface: "Failure handling: detection is best-effort; upload success is not blocked on detection failure"
    format: "JSON: aiDetection omitted or null when detection fails; upload response remains backward compatible"
  - from_task: T1
    to_task: T3
    interface: "Backend threshold normalization + timeout config + AI tag auto-apply behavior"
    format: "env/config + API behavior"

tasks:
  - id: T1
    title: "Backend upload AI detection + auto-tag + threshold config"
    description: |
      Update the artwork upload controller to call /api/ai/detect-image for the primary image (explicit target
      when multiple images exist), compare against a configurable threshold (accept percent or float and normalize
      to 0..1), auto-apply the canonical AI tag when above threshold, and return aiDetection metadata including
      canonicalTag + tagApplied in the upload response. Add env/config wiring for the threshold with default 0.7
      and a detection timeout config with a concrete default (ms). Keep changes minimal and aligned with existing
      tag normalization.
      Add optional logging for detection errors (non-blocking) to aid triage.
      Ensure backward compatibility: upload succeeds even if aiDetection is missing.
    wave: 1
    agent: gem-implementer
    prototype: false
    covers: ["AC1", "AC2", "AC3"]
    priority: high
    status: pending
    dependencies: []
    conflicts_with: []
    estimated_lines: 110
    verification:
      - "Upload without AI response still succeeds and returns no aiDetection."
      - "Upload with AI response above threshold applies canonical AI tag once."
      - "Threshold accepts percent or float inputs and normalizes to 0..1 with default 0.7."
      - "Detection request uses configured timeout with default value."
    acceptance_criteria:
      - "Upload calls /api/ai/detect-image for primary image and returns aiDetection when available."
      - "AI tag applied uses canonical name (no variants) when above threshold, and response includes canonicalTag + tagApplied."
      - "Detection failure does not block upload; aiDetection may be omitted."
    context_files:
      - path: backend/controllers/artwork.controller.js
        description: "Upload handler and tag normalization logic."
      - path: backend/config/env.js
        description: "Environment config for new AI threshold."
      - path: backend/controllers/ai.controller.js
        description: "Existing AI detection handler contract."
  - id: T2
    title: "Frontend warning + auto-tag in upload UI"
    description: |
      Extend the artwork store and upload view to surface aiDetection from the upload response.
      When above threshold, show a warning below the image preview and auto-add the AI tag in the UI
      without duplicating an existing AI tag. Use aiDetection.tagApplied + aiDetection.canonicalTag
      as the source of truth for the UI tag. Use placeholder copy unless final copy is provided.
      Keep UI changes minimal and consistent with existing upload components.
    wave: 2
    agent: gem-implementer
    prototype: false
    covers: ["AC4"]
    priority: medium
    status: pending
    dependencies:
      - T1
    conflicts_with: []
    estimated_lines: 90
    verification:
      - "UI warning appears only when aiDetection.aboveThreshold is true."
      - "AI tag appears once in UI even if user already added it, using canonicalTag from response."
      - "No warning shown when aiDetection is missing or below threshold."
    acceptance_criteria:
      - "Upload UI shows warning below preview when above threshold."
      - "AI tag auto-added in UI using canonicalTag from response without duplicates."
    context_files:
      - path: frontend/src/views/UploadArtworkView.vue
        description: "Upload UI and submit flow."
      - path: frontend/src/stores/artwork.store.js
        description: "Submit action and response handling."
      - path: frontend/src/services/api.js
        description: "Upload API wrapper."
  - id: T3
    title: "Validation: upload AI detection flow"
    description: |
      Add minimal validation steps for backend and frontend behavior: API smoke check for AI metadata
      in upload response, and Playwright upload flow to confirm UI warning and auto-tag display.
      Capture a screenshot artifact of the warning state.
    wave: 3
    agent: gem-browser-tester
    prototype: false
    covers: ["AC1", "AC2", "AC3", "AC4"]
    priority: medium
    status: pending
    dependencies:
      - T1
      - T2
    conflicts_with: []
    estimated_lines: 60
    verification:
      - "API response includes aiDetection (canonicalTag + tagApplied) when detection succeeds and omits when it fails."
      - "Playwright confirms warning and AI tag once in UI."
      - "Screenshot artifact saved under test-artifacts/screenshots/artwork-ai-detection/."
    acceptance_criteria:
      - "Playwright smoke check passes for above-threshold case."
      - "Screenshot captured for warning state."
    context_files:
      - path: frontend/playwright_check.spec.js
        description: "Baseline Playwright checks (pattern reference)."
      - path: frontend/src/views/UploadArtworkView.vue
        description: "UI warning location for validation."

