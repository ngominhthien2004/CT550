plan_id: topbar-search-unified-2026-05-25
objective: "Update top bar search UI to a single unified Pixiv-style control using existing AppSearchBar and AppTopBarSearchControls, with minimal scope."
created_at: "2026-05-25"
created_by: "gem-planner"
status: pending_approval
research_confidence: low

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 1
  risk_score: low

tldr: |
  Combine the top bar search input and scope menu into one unified control by
  adding an optional trailing slot to AppSearchBar (compact only) and embedding the scope selector
  inside it from AppTopBarSearchControls. AppTopBarSearchControls owns scope open state and mutual exclusion
  between search history and scope menus, and triggers AppSearchBar closeHistory via an exposed API/event.
  Use a unified container CSS strategy for focus/hover states, anchor dropdowns to the shared container with
  explicit alignment rules (shared left edge + width, no offset drift), and implement ARIA/focus management
  for predictable keyboard and screen reader behavior. Mobile behavior: scope button becomes icon-only below
  the breakpoint.
  Default decision: show scope label text on desktop.
open_questions: []

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: "Search history panel or scope menu overlaps or misaligns after the control is unified."
      likelihood: medium
      impact: medium
      mitigation: "Adjust AppSearchBar compact layout padding and z-index to keep dropdowns aligned."
  assumptions:
    - "No backend or route changes are required."
    - "AppSearchBar can accept a slot without impacting showcase variants."
    - "AppTopBarSearchControls owns scope open state and mutual exclusion, and can trigger AppSearchBar closeHistory."
    - "Scope label hides at <= 640px (sm); scope button becomes icon-only at that breakpoint and below."
    - "Long scope labels use ellipsis with a max width to avoid shrinking the input excessively."
    - "Scope selector shows label text on desktop by default."
    - "Search history and scope dropdowns are mutually exclusive (only one open at a time)."
    - "Focus and interaction rules (keyboard navigation, focus return, mutual exclusion) remain as planned."

implementation_specification:
  code_structure: "Modify existing Vue components only; no new components or routes. Use a unified container class in compact mode to consolidate border, background, focus, and hover states across the input + scope button."
  affected_areas:
    - "frontend/src/components/layout/AppSearchBar.vue"
    - "frontend/src/components/layout/AppTopBar/AppTopBarSearchControls.vue"
  component_details:
    - component: "AppSearchBar"
      responsibility: "Render the search input and optional trailing content in compact variant, using a single unified container styling strategy."
      interfaces:
        - "Named slot for trailing control (e.g., scope selector) rendered only in compact variant."
        - "Unified container class for consistent focus/hover styling across input + trailing control."
        - "Expose closeHistory API/event so parent can close search history when scope menu opens."
        - "Provide ARIA/focus hooks needed by parent to manage dropdown focus return and screen reader state."
    - component: "AppTopBarSearchControls"
      responsibility: "Compose AppSearchBar with scope selector inside a single unified control, own scope open state and mutual exclusion, anchor dropdowns to the shared container with explicit alignment rules, and manage ARIA/focus behavior for menus."
      interfaces:
        - "Uses AppSearchBar trailing slot to render scope menu button and dropdown."
        - "Dropdown anchoring uses shared container as the positioning reference (shared left edge + width)."
        - "Triggers AppSearchBar closeHistory when scope menu opens."
        - "Owns ARIA attributes and focus transfer/return between input, scope button, and dropdown."
  dependencies:
    - component: "AppTopBarSearchControls"
      relationship: "Consumes AppSearchBar trailing slot to render scope selector within the unified control."
  integration_points:
    - "AppTopBar.vue continues to pass props/emit events into AppTopBarSearchControls without behavior changes."

contracts:
  - from_task: "T1"
    to_task: "T2"
    interface: "AppSearchBar exposes a named trailing slot plus a closeHistory API/event for external menu coordination."
    format: "Vue named slot (e.g., <slot name=\"trailing-control\" />) + event/prop/method contract"

tasks:
  - id: "T1"
    title: "Add optional trailing slot support to AppSearchBar compact variant"
    description: |
      Add a named slot inside the compact search content area to allow AppTopBarSearchControls
      to render a scope selector within the same control. Keep default behavior unchanged for
      other variants and pages. Slot should render only in compact variant, and the unified
      container CSS strategy should keep focus/hover states consistent across the input + slot.
      Expose a closeHistory API/event so the parent can close search history when scope opens.
      Add ARIA/focus management hooks so the parent can control focus return and expanded state.
    wave: 1
    agent: gem-implementer
    prototype: false
    covers: []
    priority: medium
    status: pending
    dependencies: []
    conflicts_with: []
    estimated_lines: 70
    acceptance_criteria:
      - "Compact variant renders the trailing slot; non-compact variants ignore it."
      - "Unified container focus/hover styles apply to input and trailing slot as one control."
      - "AppSearchBar exposes a closeHistory API/event that can be invoked externally."
      - "ARIA/focus management hooks exist to support parent-owned dropdown behavior."
    verification:
      - "Keyboard focus on input and trailing control shows the same focus ring/hover state."
      - "Non-compact search usages (login/signup showcase) keep current layout and history behavior unchanged."
      - "No visual regression on non-compact search usages."
    context_files:
      - path: "frontend/src/components/layout/AppSearchBar.vue"
        description: "Search bar component used by top bar and auth pages."

  - id: "T2"
    title: "Unify top bar search control by embedding scope selector inside AppSearchBar"
    description: |
      Update AppTopBarSearchControls to render the scope selector in the AppSearchBar trailing slot,
      removing the split layout. Align spacing and dropdown positioning so the unified control matches
      a Pixiv-style single control. Anchor dropdowns to the unified container with explicit alignment
      rules (history and scope menus share the same left edge and width). AppTopBarSearchControls owns
      scope open state and mutual exclusion, and triggers AppSearchBar closeHistory when opening scope.
      Ensure only one dropdown is open at a time (search history vs scope), keep focus/hover styling
      unified, implement ARIA attributes and focus transfer/return for keyboard and screen reader
      users, and define mobile behavior: scope button becomes icon-only below the breakpoint. Show
      scope label text on desktop by default.
    wave: 2
    agent: gem-implementer
    prototype: false
    covers: []
    priority: medium
    status: pending
    dependencies:
      - "T1"
    conflicts_with: []
    estimated_lines: 90
    acceptance_criteria:
      - "Top bar search input and scope selector render as a single unified control."
      - "Scope dropdown anchors to the unified container and aligns with the input (shared left edge + width)."
      - "Search history and scope dropdowns are mutually exclusive, owned by AppTopBarSearchControls."
      - "AppTopBarSearchControls owns scope open state and closes search history when scope opens."
      - "Scope label hides at <= 640px (sm), making the button icon-only at that size and below."
      - "Scope label text appears on desktop by default."
      - "Long scope labels use ellipsis with a max width so the input does not shrink excessively."
      - "ARIA attributes and focus transfer/return are implemented for input, scope button, and dropdown."
    verification:
      - "Keyboard navigation reaches input and scope button; focus ring is consistent."
      - "ARIA attributes for scope button and dropdown reflect expanded state and are screen-reader friendly."
      - "Focus moves predictably when opening/closing history or scope menus (no focus loss)."
      - "Hover styles are unified across the combined control."
      - "Opening scope dropdown closes search history panel and vice versa."
      - "At <= 640px, scope label is hidden and the control remains icon-only without layout shift."
      - "Long scope labels truncate with ellipsis and the input width remains usable."
      - "Non-compact search usages (login/signup showcase) render unchanged with correct focus styles."
    context_files:
      - path: "frontend/src/components/layout/AppTopBar/AppTopBarSearchControls.vue"
        description: "Top bar search composition and scope menu UI."

