plan_id: user-search-2026-05-12
objective: Check frontend for existing user search UI and related API endpoints.
focus_area: frontend-user-search
created_at: "2026-05-12"
created_by: gem-researcher
status: completed

tldr: |
  - Search UI is centered on artworks: AppSearchBar sends queries to /search and SearchResultsView filters artworks client-side.
  - A user search input exists only in the admin panel, backed by /users/admin/list with q and role filters.
  - Top bar scope menu includes "user" but no user search route or API usage is wired for public user search.
  - Docs confirm Search Results is frontend-only using /api/artworks for data.

