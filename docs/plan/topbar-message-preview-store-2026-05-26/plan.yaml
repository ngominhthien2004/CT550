    description: |
      Replace direct API calls in AppTopBar with message store state/actions.
      Map preview items so the panel shows the peer (recipient for outgoing,
      sender for incoming) using the store's peerLabel helper while keeping
      the panel component unchanged.

      Acceptance criteria:
      - AppTopBar preview no longer calls getMyMessages directly.
      - Preview shows the latest message per thread across inbox/sent.
      - Preview ordering matches store ordering (newest first).
      - Peer display uses fallback label when name fields are missing.
      - Mark-read uses store action and updates unread count.

      Verification:
      - Open message preview, confirm messages are shown from store with correct names.
      - Confirm preview refreshes when cache is stale and preview is opened.

