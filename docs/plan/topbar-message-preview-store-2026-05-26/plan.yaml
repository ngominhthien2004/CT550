created_by: gem-planner
status: pending_approval
research_confidence: low

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 2
  risk_score: low

tldr: |
  Define preview composition, fetch limits, and unread indicator rules in the message
  store, then refactor AppTopBar and MessagesView to use the store so sent messages
  appear in preview without duplicates.

open_questions: []

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: Store preview shows duplicates or misses outbound messages after send.
      likelihood: medium
      impact: medium
      mitigation: Keep separate inbox/sent caches, dedupe by message _id, and reconcile optimistic sends with server responses.
    - scenario: Thread grouping merges unrelated conversations when thread id is missing.
      likelihood: low
      impact: medium
      mitigation: Use threadId when present; otherwise fall back to 1:1 peer id and document limitation.
    - scenario: Unread indicator shows on threads where the latest message is outbound.
      likelihood: medium
      impact: low
      mitigation: Compute per-thread unread flag only if latest message is inbound and unread.
  assumptions:
    - AppTopBar preview only needs a small list (<= 5) and can be derived from store state.
    - MessagesView can call store actions without changing its existing UI structure.
    - Freshness can be handled by store-level timestamps without polling.

implementation_specification:
  code_structure: |
    Keep message data flow centralized in the Pinia message store. AppTopBar should consume
    store state/actions and avoid direct API calls. MessagesView should route send operations
    through the store so outbound messages update store caches. Preview composition is a
    store-derived selector that merges inbox/sent, dedupes, groups by thread, and orders by
    newest message across threads.
  affected_areas:
    - frontend/src/stores/message.store.js
    - frontend/src/components/layout/AppTopBar/AppTopBar.vue
    - frontend/src/views/MessagesView.vue
  component_details:
    - component: message.store.js
      responsibility: Maintain inbox/sent caches, unread count, freshness metadata, and expose preview-ready list.
      interfaces:
        - action: fetchMessages({ box, limit })
        - action: sendMessage(payload)
        - selector: previewItems (latest per thread, newest first, deduped, unreadOnlyIfLatestInbound)
        - selector: previewMeta (previewCount, inboxCount, sentCount, lastFetchedAtInbox, lastFetchedAtSent, lastPreviewComposedAt)
        - helper: threadKey(message) => threadId if present, else peer user id
        - helper: peerLabel(message) => display name fallback
    - component: AppTopBar.vue
      responsibility: Read preview data from message store and handle read actions via store.
      interfaces:
        - uses: useMessageStore()
        - uses: previewItems, unreadCount, loading, error
    - component: MessagesView.vue
      responsibility: Use message store to send messages so outbound messages update preview.
      interfaces:
        - uses: useMessageStore().sendMessage(payload)
  dependencies:
    - component: AppTopBar.vue
      relationship: Reads from message.store.js (state + actions)
    - component: MessagesView.vue
      relationship: Uses message.store.js send action to update caches
  integration_points:
    - AppTopBar message preview open handler
    - MessagesView sendMessage flow

contracts:
  - from_task: T1-store-cache
    to_task: T2-topbar-preview
    interface: Provide preview-ready items list and unread count from the message store.
    format: Pinia store state/getter
  - from_task: T1-store-cache
    to_task: T3-messagesview-send
    interface: Expose sendMessage action that updates sent cache and keeps items consistent.
    format: Pinia store action

tasks:
  - id: T1-store-cache
    title: Add inbox/sent caches and preview selector to message store
    description: |
      Update the Pinia message store to maintain separate inbox/sent lists and a
      preview-ready list combining both. Define thread/preview composition as the
      latest message per thread, where thread key is threadId if present; otherwise
      use the peer user id (sender for inbox, recipient for sent) and treat as 1:1.
      Dedupe by message _id before thread reduction and reconcile optimistic sends
      with server responses (replace temp ids, avoid duplicates). Order preview
      items by createdAt desc across threads. Unread semantics are inbox-only: sent
      messages are always read, and per-thread unread indicator is true only when
      the latest message is inbound and unread. Add freshness triggers: fetch on
      preview open when cache missing or stale (age > 60s) using per-box
      lastFetchedAt timestamps, with a small per-box limit (<= 5) to reduce payload.
      Add preview metrics in store state (previewCount, inboxCount, sentCount,
      lastFetchedAtInbox, lastFetchedAtSent, lastPreviewComposedAt). Provide
      fallback labels for peer display (displayName -> username -> "Unknown user").

      Acceptance criteria:
      - Store exposes a preview list that includes outbound messages after sending.
      - Preview list uses latest message per thread and is ordered by createdAt desc.
      - Dedupe uses message _id and does not show duplicates across boxes.
      - Unread count reflects unread inbox messages only; sent messages are read.
      - Thread key uses threadId when available; otherwise uses peer id for 1:1.
      - Preview per-thread unread indicator is false when latest message is outbound.
      - Preview fetch uses a small per-box limit (<= 5).
      - Freshness triggers fetch when caches are empty or stale (> 60s).
      - Preview metrics are available in store state.
      - Existing consumers using items/activeBox still work.

      Verification:
      - Unit-level manual check: open AppTopBar preview after sending a message and
        confirm it appears without a refresh.
      - Inspect preview entries where latest message is outbound; unread indicator should be off.
      - Verify preview uses fallback labels when peer name fields are missing.

      Estimated lines: 60-120
