plan_id: messages-wrap-fix-2026-05-26
objective: Ensure all message content containers (or shared parent) apply wrapping rules and prevent nested horizontal overflow in the messages thread.
created_at: "2026-05-26"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 1
  risk_score: low

tldr: |
  - Apply wrapping to all message content containers or a shared parent to catch nested content blocks.
  - Account for scoped CSS boundaries using :deep() or a global utility class when child components are involved.
  - Hide horizontal overflow on the thread body (and nested containers if needed) to avoid sideways scrolling.
  - Validate with a long unbroken message string to confirm wrapping and no horizontal scrollbar.
open_questions: []

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: Word-break rules affect layout for normal short messages.
      likelihood: low
      impact: medium
      mitigation: Apply wrapping only to message text elements and avoid changing bubble sizing rules.
    - scenario: Scoped styles prevent wrapping from applying to child components.
      likelihood: medium
      impact: medium
      mitigation: Use :deep() selectors or move wrapping to a shared parent/global class.
  assumptions:
    - Messages UI uses MessagesView.vue with styles in MessagesView.css.
    - Wrapping can be applied to `.bubble-body`, `.quote-text`, or a shared parent container.
    - Some message content may render inside child components with scoped styles.

implementation_specification:
  code_structure: Add targeted CSS rules in MessagesView.css for message text (or shared parent) and thread container, including nested overflow handling.
  affected_areas:
    - frontend/src/views/MessagesView.css
    - frontend/src/views/MessagesView.vue
  component_details:
    - component: MessagesView.css
      responsibility: Provide wrapping rules for message text or a shared parent and hide horizontal overflow in the thread body (and nested containers if needed).
      interfaces:
        - CSS selectors: .thread-body, .bubble-body, .quote-text, or shared parent class
    - component: MessagesView.vue
      responsibility: Hosts the thread layout and message text nodes targeted by CSS selectors.
      interfaces:
        - Markup classes: thread-body, bubble-body, quote-text, or shared parent wrapper
  dependencies:
    - component: MessagesView.vue
      relationship: CSS selectors in MessagesView.css must match template class names.
  integration_points:
    - MessagesView.vue imports MessagesView.css via scoped style; use :deep() if targeting child component content.

contracts:
  - from_task: task_update_message_wrap_css
    to_task: task_validate_thread_wrap_ui
    interface: Updated CSS selectors and rules for `.thread-body` plus message text containers or shared parent (with :deep() if needed).
    format: CSS changes in MessagesView.css

tasks:
  - id: task_update_message_wrap_css
    title: Update message wrapping and overflow rules
    description: |
      Add word-break/overflow-wrap rules to message bubble text or a shared parent wrapper and hide
      horizontal overflow in the thread body container using existing selectors in MessagesView.css.
      Ensure all message content containers are covered; if content lives in child components under
      scoped styles, use :deep() selectors or move wrapping to a shared parent class. Address nested
      overflow by confirming inner containers do not re-enable horizontal scrolling.
    wave: 1
    agent: gem-implementer
    prototype: false
    covers:
      - AC1
      - AC2
    priority: medium
    status: pending
    estimated_lines: 30
    acceptance_criteria:
      - AC1: Long unbroken strings in message bubbles and quotes wrap instead of overflowing.
      - AC2: Thread body does not show horizontal scrolling during long-string messages.
    verification:
      - Check `.thread-body` includes `overflow-x: hidden` and nested containers do not re-enable overflow-x.
      - Check `.bubble-body` and `.quote-text` (or shared parent) include word-break/overflow-wrap rules.
      - If scoped styles block child components, confirm :deep() or a global class is used.
    dependencies: []
    conflicts_with: []
    context_files:
      - path: frontend/src/views/MessagesView.css
        description: Thread container and message bubble styles.
      - path: frontend/src/views/MessagesView.vue
        description: Template classes for thread body and message text.

  - id: task_validate_thread_wrap_ui
    title: Validate message wrapping in UI
    description: |
      Perform a lightweight UI check in the messages thread to confirm long strings wrap and no
      horizontal scrolling appears.
    wave: 2
    agent: gem-browser-tester
    prototype: false
    covers:
      - AC1
      - AC2
    priority: low
    status: pending
    estimated_lines: 0
    acceptance_criteria:
      - AC1: Long unbroken strings in message bubbles and quotes wrap instead of overflowing.
      - AC2: Thread body does not show horizontal scrolling during long-string messages.
    verification:
      - Open messages thread view and render a long unbroken string (e.g., 200+ characters without spaces) in body and quote.
      - Confirm text wraps in all message content containers and no horizontal scrollbar appears.
      - Check nested containers inside the thread do not introduce horizontal overflow.
    dependencies:
      - task_update_message_wrap_css
    conflicts_with: []
    context_files:
      - path: frontend/src/views/MessagesView.css
        description: Expected CSS changes for wrapping and overflow.

