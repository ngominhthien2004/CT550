plan_id: ai-detection-upload-20260521
objective: Integrate AI image detection into artwork upload flow with backend-first sequencing and UI warnings.
created_at: "2026-05-21"
created_by: gem-planner
status: pending_approval
research_confidence: medium

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 3
  risk_score: medium

tldr: |
  - Run AI detection pre-submit on the selected file to show a warning under the preview, then re-detect on backend for tagging.
  - Standardize aiDetection payload (confidence 0-100, error shape) and define primary image handling.
  - Ensure AI tag upsert and idempotent tagging in the backend.

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: AI detection service fails or times out during upload, blocking artwork creation.
      likelihood: medium
      impact: high
      mitigation: Use a short timeout and continue upload with a non-blocking warning state when detection fails.
    - scenario: UI cannot show the warning because the upload flow redirects immediately after submit.
      likelihood: medium
      impact: medium
      mitigation: Return detection metadata in the create response and surface warning before redirect or after submit in-place.
    - scenario: Frontend pre-submit detection and backend re-detection disagree, confusing users.
      likelihood: medium
      impact: medium
      mitigation: Use the same threshold, normalize confidence 0-100, and show copy that clarifies tagging happens on submit.
  assumptions:
    - /api/ai/detect-image remains stable and returns confidence/isAI data.
    - Product allows auto-tagging with a normalized tag name such as "ai" when above threshold.
    - Upload UI has access to the selected file before submit to call AI detection.

implementation_specification:
  code_structure: |
    Keep backend changes within artwork controller/config and existing AI controller. Frontend should reuse the upload view
    and artwork store, with minimal additions to surface detection warnings.
  affected_areas:
    - backend/controllers/artwork.controller.js
    - backend/config/env.js
    - backend/.env.example
    - frontend/src/stores/artwork.store.js
    - frontend/src/views/UploadArtworkView.vue
    - frontend/src/services/api.js
  component_details:
    - component: createArtwork upload flow
      responsibility: Re-detect AI for the primary image on submit, apply threshold, upsert AI tag, and include detection
        metadata in the response.
      interfaces:
        - POST /api/artworks response adds aiDetection: { confidence, isAI, threshold, tagged, error }
    - component: primary image selection
      responsibility: Define primary image as the first uploaded image; only this file is used for AI detection.
      interfaces:
        - createArtwork selects images[0] for detection
    - component: AI detection config
      responsibility: Provide a configurable threshold via env/config with default 70%.
      interfaces:
        - getAiDetectionThreshold() -> number
    - component: Upload UI warning
      responsibility: Run pre-submit detection on selected file and show warning under image preview when above threshold.
      interfaces:
        - UploadArtworkView uses aiDetectionPreview state from artworkStore
        - Warning copy: "Ảnh của bạn được phát hiện là tạo bằng AI, chúng tôi sẽ gắn sẵn tag AI cho bạn. Nếu bạn cho rằng sai, hãy gỡ thủ công tag AI."
    - component: aiDetection error shape
      responsibility: Standardize error output for both pre-submit and submit detection.
      interfaces:
        - aiDetection.error: { code, message } when detection fails
    - component: tag upsert/idempotency
      responsibility: Ensure AI tag is created once and not duplicated on repeated uploads.
      interfaces:
        - Tag upsert uses normalized name and avoids duplicate tag assignment
  dependencies:
    - component: artwork controller
      relationship: Depends on ai.controller detection service behavior and env config values.
    - component: upload UI
      relationship: Depends on AI detection endpoint and createArtwork response containing aiDetection metadata.
  integration_points:
    - backend/routes/artwork.routes.js -> createArtwork
    - backend/controllers/ai.controller.js -> detectAIImage
    - frontend UploadArtworkView -> artworkStore.detectAiPreview
    - frontend UploadArtworkView -> artworkStore.submitArtwork

contracts:
  - from_task: T1
    to_task: T2
    interface: createArtwork returns aiDetection metadata (confidence 0-100, isAI, threshold, tagged, error)
    format: JSON payload in create artwork response

