plan_id: premium-ui-20260428
objective: "Research existing codebase for premium-related UI: topbar premium button, routes, any premium view or styles. Identify where to add /premium route, layout patterns, and reusable components."
focus_area: "frontend-premium-ui"
created_at: "2026-04-28"
created_by: "gem-researcher"
status: "completed"

tldr: |
  - Top bar already renders a Premium CTA as a pill link to /signup via AppTopBarSearchControls; workflow docs confirm this behavior.
  - Router has no /premium route and no Premium view file exists in frontend/src/views.
  - Shared layout pattern uses MainLayoutTemplate + AppTopBar + AppSidebarMenu with navItems and isNavCollapsed.
  - Premium UI mentions currently appear in admin management (premium status) and creator dashboard tabs (premium chip).

