plan_id: messaging-fixes-2026-05-27
objective: Fix messaging issues: avatars in threads/bubbles/header, typing + online status without websockets, mobile UX thread/chat switch, thread search, and per-user soft delete.
created_at: "2026-05-27"
created_by: gem-planner
status: pending_approval
research_confidence: medium

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 5
  risk_score: medium

tldr: |
  - Update PRD first with decisions and acceptance criteria for messaging fixes.
  - Add minimal backend support for per-user soft delete, thread search, and lightweight typing/online status via polling-friendly endpoints.
  - Update frontend store + MessagesView for avatars, mobile thread/chat UX with back navigation, search within thread, and delete action.

decisions:
  - "Soft delete hides messages only for the deleting user; other users keep visibility. Thread list ordering and last-message preview are computed per viewer, skipping messages deleted by that viewer."
  - "Typing and presence are derived from timestamps with TTL: typing TTL = 10s, presence TTL = 120s (active in last 2 minutes)."
  - "Mobile navigation: default to thread list; selecting a thread opens chat view; back action returns to thread list without losing the selected thread state."
  - "Avatar fallback: if user avatar is missing or broken, use a single default placeholder image; do not render initials-only avatars in this flow."

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Polling-based typing/online status causes excessive API load or stale indicators.
      likelihood: medium
      impact: high
      mitigation: Add rate limits (client-side debounce + server-side minimal payload) and define a conservative polling interval.
    - scenario: Soft delete logic hides messages globally or breaks unread counts.
      likelihood: medium
      impact: high
      mitigation: Track per-user deletion (sender/recipient flags or deletedBy array) and adjust list queries accordingly.
  assumptions:
    - The existing auth middleware (`protect`) remains unchanged and applies to new message endpoints.
    - Message list and thread queries can accept optional filters without breaking current clients.

implementation_specification:
  code_structure: |
    Extend Message model with per-user delete metadata and lightweight presence markers. Add new controller methods in message.controller.js and routes in message.routes.js. Frontend changes stay in MessagesView, message store, and api service without new frameworks.
  affected_areas:
    - backend/models/Message.js
    - backend/controllers/message.controller.js
    - backend/routes/message.routes.js
    - backend/models/User.js
    - frontend/src/views/MessagesView.vue
    - frontend/src/views/MessagesView.css
    - frontend/src/stores/message.store.js
    - frontend/src/components/layout/AppTopBar/AppTopBarMessagePanel.vue
    - frontend/src/services/api.js
    - docs/PRD.yaml
  component_details:
    - component: Message model
      responsibility: Store per-user soft delete metadata and support query filters.
      interfaces:
        - "fields: deletedBy | senderDeleted/recipientDeleted"
        - "query rule: exclude viewer-deleted messages when computing thread list ordering and last-message preview"
    - component: Message controller
      responsibility: Provide thread search, soft delete, typing status, and online presence endpoints.
      interfaces:
        - "GET /api/messages/thread/:userId/search?q=&page=&limit="
        - "PATCH /api/messages/:id/delete"
        - "POST /api/messages/typing"
        - "GET /api/messages/presence/:userId"
    - component: Message store
      responsibility: Fetch threads/messages, manage polling, expose typing/online/search/delete actions.
      interfaces:
        - "actions: fetchThread, searchThread, deleteMessage, startPresencePolling"
    - component: MessagesView
      responsibility: Render avatars, mobile layout with back button, search UI, delete action, typing/online indicators.
      interfaces:
        - "props/state: activeThreadId, threadSearchQuery, typingState, presenceState"
  dependencies:
    - component: MessagesView
      relationship: Uses Message store actions and data to render UI states.
    - component: Message controller
      relationship: Uses Message model filters for per-user delete and search.
  integration_points:
    - "api.js updates to call new message endpoints"
    - "AppTopBarMessagePanel uses store-provided avatar URLs"

