plan_id: messaging-fixes-2026-05-27
objective: Research codebase for messaging features to support fixes (avatar rendering, mobile UX, search/delete messages, typing/online status).
focus_area: messaging
created_at: 2026-05-27
created_by: gem-researcher
status: completed

tldr: |
  - Direct messages are implemented via Message model + message routes/controller with read marking only; no search or delete endpoints present.
  - Messages UI is centered in MessagesView (thread list + chat pane) with mobile CSS at 920px breakpoint; avatar rendering in threads uses initials, not avatar URLs.
  - Top bar message preview uses message store previewItems and does not render avatars.
  - User model includes avatar and coverImage fields; no online/typing/presence fields detected in model or UI.
  - Request chat is a separate messaging flow under requests with its own model and routes.

research_metadata:
  methodology: hybrid retrieval using semantic_search + grep_search, targeted read_file, and manual line counts via PowerShell
  scope: messaging models, controllers, routes, UI views/components, and related docs
  confidence: medium
  coverage: 0.78
  decision_blockers: 0
  research_blockers: 0

