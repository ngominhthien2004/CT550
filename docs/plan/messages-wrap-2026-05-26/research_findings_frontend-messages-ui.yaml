plan_id: messages-wrap-2026-05-26
objective: Fix messages UI so long unbroken strings wrap and horizontal overflow is hidden in thread. Locate Vue/CSS selectors for message content and thread container.
focus_area: frontend-messages-ui
created_at: "2026-05-26"
created_by: gem-researcher
status: completed

tldr: |
  - Message thread markup is in MessagesView.vue with `.thread-body`, `.message-flow`, `.bubble`, `.bubble-quote`, `.quote-text`, and `.bubble-body` elements.
  - MessagesView.css defines layout for `.thread-body` (overflow-y only) and message bubble styles but does not include explicit word-break/overflow-wrap rules.
  - Quote content uses line-clamp with overflow hidden, which may interact with long unbroken strings.

