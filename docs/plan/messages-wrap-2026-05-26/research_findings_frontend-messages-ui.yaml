patterns_found:
  - category: structure
    pattern: Thread layout split into list pane and thread pane with a scrollable body
    description: The thread UI is organized into a `.thread-body` scroll container and a `.message-flow` grid.
    examples:
      - file: frontend/src/views/MessagesView.css
        location: MessagesView.css:136
        snippet: ".thread-body { overflow-y: auto; padding: 1rem 1.1rem; background: #f9fbff; }"
    prevalence: common

  - category: structure
    pattern: Message content rendered in `.bubble-body` and optional `.quote-text`
    description: Message text nodes are placed inside dedicated classes in the template.
    examples:
      - file: frontend/src/views/MessagesView.vue
        location: MessagesView.vue:601
        snippet: "<p class=\"bubble-body\">{{ parseMessageContent(row.item.content).body }}</p>"
    prevalence: common

  - category: structure
    pattern: Quote text uses line clamping and hidden overflow
    description: Quote text is clamped to 2 lines and overflow is hidden by CSS.
    examples:
      - file: frontend/src/views/MessagesView.css
        location: MessagesView.css:692
        snippet: ".quote-text { -webkit-line-clamp: 2; overflow: hidden; }"
    prevalence: occasional

