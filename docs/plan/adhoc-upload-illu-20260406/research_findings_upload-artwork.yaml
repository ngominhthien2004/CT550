tldr: |
  - Backend da co endpoint tao artwork voi upload anh: POST /api/artworks, co protect + multer array images.
  - Frontend chua co route/view/store action rieng cho Dang Illu; hien tai chi co luong doc artwork.
  - Contract create artwork dang phu thuoc multipart/form-data va yeu cau images bat buoc, de gay mismatch neu muon ho tro type=novel.
  - Diem gan UI gan nhat la nut Post trong top bar, hien dang tro ve '/'.

