    to_task: T02
    interface: Action submitArtwork nhan payload form va tra ket qua create; contract backend giu nguyen yeu cau images >= 1 cho moi type (bao gom novel)
    format: Pinia action contract (Promise, state loading/error)
  - from_task: T02
    to_task: T03
    interface: Route /upload co meta requiresAuth va guard dieu huong guest truoc khi tiep tuc hoan tat upload view
    format: Vue Router route meta + global/per-route guard contract
  - from_task: T03
    to_task: T04
    interface: UploadArtworkView duoc export, submit su dung contract images >=1, va route /upload hoat dong cho user da dang nhap
    format: Vue SFC default export + navigation
  - from_task: T04
    to_task: T05
    interface: Bao cao ket qua build va smoke test de reviewer danh gia
    format: Test evidence (terminal output + manual smoke notes)

