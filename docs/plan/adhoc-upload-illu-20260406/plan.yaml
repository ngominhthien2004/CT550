tldr: |
  Ke hoach tap trung vao frontend theo huong toi thieu: bo sung service + store action tao artwork,
  gan route upload co guard dang nhap, cap nhat nut Post o topbar, hoan tat view Dang Illu co form bat buoc,
  sau do verify bang npm run build frontend va smoke test, bao gom cac truong hop doi khang.
open_questions:
  - Chua co docs/PRD.yaml trong workspace, tam khoa scope theo user request hien tai.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Form gui JSON thay vi multipart/form-data lam backend khong nhan req.files
      likelihood: medium
      impact: high
      mitigation: Rang buoc store action dung FormData, append images dung field "images".
    - scenario: Nut Post tro sai route, nguoi dung khong vao duoc trang Dang Illu
      likelihood: medium
      impact: medium
      mitigation: Cap nhat AppTopBar va smoke test dieu huong den route upload.
    - scenario: Submit that bai do user chua dang nhap (protect middleware)
      likelihood: high
      impact: medium
      mitigation: Hien thi thong bao loi ro rang trong view/store; smoke test bang tai khoan da dang nhap.
  assumptions:
    - Endpoint POST /api/artworks da on dinh va khong doi contract.
    - Frontend tiep tuc dung Pinia + axios client trong src/services/api.js.
    - Khong mo rong backend trong pham vi nay.

implementation_specification:
  code_structure: Frontend-first trong cac diem chua co (services -> stores -> views -> router/layout), tai su dung MainLayoutTemplate va navigation hien tai.
  affected_areas:
    - frontend/src/services/api.js
    - frontend/src/stores/artwork.store.js
    - frontend/src/views/UploadArtworkView.vue
    - frontend/src/router/index.js
    - frontend/src/components/layout/AppTopBar.vue
  component_details:
    - component: Artwork API service
      responsibility: Bo sung ham goi POST /artworks bang multipart/form-data
      interfaces:
        - createArtwork(formData)
    - component: Artwork store
      responsibility: Quan ly submit tao artwork (loading, error, success, created item)
      interfaces:
        - submitArtwork(payload)
        - resetCreateState()
    - component: Upload artwork view
      responsibility: Render form toi thieu title/description/type/ageRating/tags/images va goi store submit
      interfaces:
        - Route view cho duong dan upload
    - component: Router + Topbar post entry
      responsibility: Dang ky route upload co requiresAuth, ap dung guard dang nhap theo co che router hien co, va tro nut Post den dung route
      interfaces:
        - Route name/path cho upload
  dependencies:
    - component: Upload artwork view
      relationship: Goi Artwork store action de submit
    - component: Artwork store
      relationship: Goi Artwork API service de tao artwork
    - component: AppTopBar
      relationship: Dieu huong den route upload trong Vue Router
  integration_points:
    - Frontend route table trong frontend/src/router/index.js
    - Topbar action trong frontend/src/components/layout/AppTopBar.vue
    - Axios API layer trong frontend/src/services/api.js
    - Route guard login check trong frontend/src/router/index.js

contracts:
