title: "Trang Premium"
version: "1.0"
date: "2026-04-28"
language: "vi-VN"
summary: "Xay dung trang Premium voi CTA dan den /signup, su dung tai nguyen do nhom tu tao."

routes:
  - path: "/premium"
    purpose: "Trang gioi thieu Premium va keu goi dang ky."

cta:
  primary:
    label: "Dang ky Premium"
    target: "/signup"

assets:
  source: "original"
  notes: "Tat ca hinh anh/illustration/noi dung la tai nguyen do nhom tu tao."

scope:
  in_scope:
    - "Tao trang /premium voi noi dung gioi thieu loi ich Premium."
    - "Hien thi CTA chinh dan den /signup."
    - "Noi dung Viet Nam, co dau day du."
    - "Thiet ke phan biet ro gia tri Premium (loi ich, gia tri, thong tin goi)."
  out_of_scope:
    - "Thanh toan va he thong dang ky Premium."
    - "Thay doi API hoac database."
    - "Dang nhap/phan quyen moi."

acceptance_criteria:
  - "Dieu huong den /premium hoat dong dung va trang hien thi khong loi."
  - "CTA chinh hien thi ro rang va dan den /signup."
  - "Noi dung tieng Viet co dau day du, ro rang, nhat quan thuat ngu."
  - "Su dung tai nguyen goc, khong lay tu nguon ben ngoai."
  - "Trang trinh bay loi ich Premium, bao gom toi thieu 3 loi ich cu the."

assumptions:
  - "Route /signup da ton tai va hoat dong."
  - "Khong can thay doi backend cho trang tinh /premium."

public_user_search:
  summary: "Cung cấp tìm kiếm người dùng công khai trên /search với tab User và API công khai."
  routes:
    - path: "/search"
      purpose: "Bổ sung tab User để tìm kiếm người dùng công khai."
    - path: "/api/users/search"
      purpose: "API tìm kiếm người dùng công khai, chỉ trả về trường công khai."
  scope:
    in_scope:
      - "Tìm kiếm người dùng công khai theo tên người dùng hoặc tên hiển thị."
      - "Hỗ trợ phân trang với page và limit (giới hạn limit theo cấu hình)."
      - "Chỉ trả về trường công khai (không có email, role, isPremium)."
    out_of_scope:
      - "Tìm kiếm người dùng theo tiêu chí riêng tư hoặc nội bộ."
      - "Loại bỏ điều hướng hoặc thay đổi logic tìm kiếm tác phẩm hiện tại."
  acceptance_criteria:
    - "API /api/users/search hoạt động với q, page, limit và trả về kết quả phân trang."
    - "Tab User trên /search hiển thị kết quả tìm kiếm người dùng công khai."
    - "Dữ liệu trả về không bao gồm trường nhạy cảm như email hoặc role."
  assumptions:
    - "Trang /search đã tồn tại và đang hoạt động ổn định."

ai_detection_on_upload:
  summary: "Phát hiện nội dung AI khi tải tác phẩm và cảnh báo trong UI."
  routes:
    - path: "/api/ai/detect-image"
      purpose: "Dùng lại dịch vụ phát hiện AI (HuggingFace qua ai.controller)."
  scope:
    in_scope:
      - "Thực hiện phát hiện AI ở backend trong luồng upload tác phẩm."
      - "Gọi dịch vụ /api/ai/detect-image hiện có để lấy xác suất AI."
      - "Ngưỡng cảnh báo cấu hình qua env/config (mặc định 70%)."
      - "Tự động gắn tag AI cho tác phẩm khi xác suất > 70%."
      - "Hiển thị cảnh báo dưới ảnh trong giao diện upload khi vượt ngưỡng."
    out_of_scope:
      - "Thay đổi mô hình AI hoặc thay đổi nguồn dịch vụ phát hiện."
      - "Thêm workflow khiếu nại hoặc duyệt lại kết quả AI."
  acceptance_criteria:
    - "Backend upload gọi /api/ai/detect-image và nhận được xác suất AI."
    - "Ngưỡng cảnh báo lấy từ cấu hình và có thể điều chỉnh qua env/config."
    - "Khi xác suất > 70%, tác phẩm được gắn tag AI tự động."
    - "UI upload hiển thị cảnh báo dưới ảnh khi vượt ngưỡng."
  assumptions:
    - "/api/ai/detect-image đã sẵn có và ổn định."

needs_clarification:
  - "Thông điệp cảnh báo dưới ảnh trong giao diện upload chưa chốt nội dung."
