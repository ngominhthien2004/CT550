<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1400" viewBox="0 0 1500 1400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fff8"/>
      <stop offset="0.5" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#fffaf0"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .font { font-family: "Segoe UI", Arial, sans-serif; font-weight: 800; }
      .title { font-size: 36px; fill: #064e3b; }
      .subtitle { font-size: 18px; fill: #334155; }
      .section { font-size: 28px; }
      .label { font-size: 23px; fill: #111827; }
      .small { font-size: 19px; fill: #334155; }
      .tiny { font-size: 16px; fill: #475569; }
      .mono { font-family: "Cascadia Mono", Consolas, monospace; font-size: 17px; font-weight: 800; fill: #1e293b; }
      .arrow { stroke: #111827; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrowBlue { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .dash { stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="1400" rx="28" fill="url(#bg)"/>

  <g class="font">
    <text x="750" y="58" text-anchor="middle" class="title">Luồng AI Detection khi upload ảnh</text>
    <text x="750" y="90" text-anchor="middle" class="subtitle">Upload image → HuggingFace AI-image-detector → fallback metadata → quyết định isAI và hiển thị trên form</text>

    <rect x="80" y="125" width="1340" height="1190" rx="16" fill="#f8fbff" stroke="#2563eb" stroke-width="2.5" filter="url(#shadow)"/>

    <rect x="170" y="180" width="1160" height="90" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.3"/>
    <text x="750" y="218" text-anchor="middle" class="label" fill="#166534">Người dùng chọn file upload</text>
    <text x="750" y="248" text-anchor="middle" class="small">Ảnh được chọn trong form upload artwork</text>

    <line x1="750" y1="270" x2="750" y2="325" class="arrow"/>

    <rect x="170" y="325" width="1160" height="94" rx="14" fill="#ffffff" stroke="#3b82f6" stroke-width="2.3"/>
    <text x="750" y="362" text-anchor="middle" class="label" fill="#1d4ed8">Gửi ảnh đến AI Detection API</text>
    <text x="750" y="393" text-anchor="middle" class="mono">POST /api/ai/detect-image</text>

    <line x1="750" y1="419" x2="750" y2="475" class="arrow"/>

    <rect x="170" y="475" width="1160" height="112" rx="14" fill="#fff7ed" stroke="#f59e0b" stroke-width="2.3"/>
    <text x="750" y="515" text-anchor="middle" class="label" fill="#92400e">HuggingFace model phân tích ảnh</text>
    <text x="750" y="550" text-anchor="middle" class="mono">"umm-maybe/AI-image-detector"</text>

    <path d="M750 587 C750 635, 410 620, 410 690" class="arrowBlue"/>
    <path d="M750 587 C750 635, 1090 620, 1090 690" class="arrowBlue"/>

    <rect x="155" y="690" width="510" height="150" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="2.3"/>
    <text x="410" y="730" text-anchor="middle" class="label" fill="#166534">Thành công</text>
    <text x="410" y="765" text-anchor="middle" class="small">Trả về kết quả từ model</text>
    <text x="410" y="802" text-anchor="middle" class="mono">{ isAI, confidence, reason }</text>

    <rect x="835" y="690" width="510" height="150" rx="14" fill="#fef2f2" stroke="#ef4444" stroke-width="2.3"/>
    <text x="1090" y="730" text-anchor="middle" class="label" fill="#991b1b">Thất bại</text>
    <text x="1090" y="765" text-anchor="middle" class="small">Không có HF_TOKEN hoặc API lỗi</text>
    <text x="1090" y="802" text-anchor="middle" class="small">Chuyển sang phân tích dự phòng</text>

    <line x1="1090" y1="840" x2="1090" y2="900" class="arrow"/>

    <rect x="835" y="900" width="510" height="165" rx="14" fill="#faf5ff" stroke="#9333ea" stroke-width="2.3"/>
    <text x="1090" y="940" text-anchor="middle" class="label" fill="#6b21a8">Fallback: Metadata analysis</text>
    <text x="1090" y="978" text-anchor="middle" class="small">Phân tích kích thước file</text>
    <text x="1090" y="1012" text-anchor="middle" class="small">Định dạng ảnh và cấu trúc nén</text>
    <text x="1090" y="1046" text-anchor="middle" class="small">Ước tính khả năng ảnh AI</text>

    <path d="M410 840 C410 1110, 750 1065, 750 1135" class="arrow"/>
    <path d="M1090 1065 C1090 1110, 750 1065, 750 1135" class="arrow"/>

    <rect x="155" y="1135" width="1190" height="112" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2.3"/>
    <text x="750" y="1176" text-anchor="middle" class="label" fill="#1d4ed8">Quyết định isAI dựa trên kết quả phân tích</text>
    <text x="750" y="1210" text-anchor="middle" class="small">HF API hoặc fallback đều trả về tín hiệu để frontend xử lý</text>

    <line x1="750" y1="1247" x2="750" y2="1305" class="arrow"/>
  </g>

  <g class="font" transform="translate(155 1305)">
    <rect x="0" y="0" width="1190" height="72" rx="14" fill="#fdf2f8" stroke="#db2777" stroke-width="2.3"/>
    <text x="595" y="29" text-anchor="middle" class="label" fill="#9d174d">Frontend hiển thị kết quả trên form upload</text>
    <text x="595" y="58" text-anchor="middle" class="small">isAI = true → gắn tag "ai" | isAI = false → không gắn tag</text>
  </g>

  <g class="font">
    <rect x="155" y="890" width="510" height="180" rx="14" fill="#ffffff" stroke="#60a5fa" stroke-width="2.3"/>
    <text x="410" y="930" text-anchor="middle" class="label" fill="#1e40af">Logic từ HF API</text>
    <text x="195" y="970" class="small">• aiScore &gt; realScore → isAI = true</text>
    <text x="217" y="1004" class="small">Gắn tag "ai"</text>
    <text x="195" y="1038" class="small">• confidence = max(aiScore, realScore) × 100</text>
    <text x="195" y="1072" class="small">• aiScore ≤ realScore → isAI = false</text>
  </g>
</svg>
