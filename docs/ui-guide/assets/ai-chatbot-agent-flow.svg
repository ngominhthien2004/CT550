<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1900" viewBox="0 0 1500 1900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fff8"/>
      <stop offset="0.46" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#fffaf0"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .font { font-family: "Segoe UI", Arial, sans-serif; }
      .title { font-size: 34px; font-weight: 800; fill: #064e3b; }
      .section { font-size: 28px; font-weight: 800; }
      .label { font-size: 22px; font-weight: 700; fill: #111827; }
      .small { font-size: 18px; font-weight: 500; fill: #334155; }
      .tiny { font-size: 16px; font-weight: 500; fill: #475569; }
      .mono { font-family: "Cascadia Mono", Consolas, monospace; font-size: 17px; fill: #1e293b; }
      .arrow { stroke: #111827; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrowBlue { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .dash { stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 8; fill: none; }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="1900" rx="28" fill="url(#bg)"/>

  <g class="font">
    <text x="750" y="60" text-anchor="middle" class="title">Luồng xử lý AI Chatbot IlluWrl</text>
    <text x="750" y="93" text-anchor="middle" class="small">Frontend gửi message → Backend xác thực → Tool theo intent → AI provider → Lưu và trả kết quả</text>

    <rect x="60" y="125" width="1380" height="255" rx="14" fill="#f0fdf4" stroke="#15803d" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="750" y="168" text-anchor="middle" class="section" fill="#166534">Frontend (Vue 3 / Pinia)</text>

    <rect x="135" y="205" width="500" height="115" rx="12" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
    <text x="385" y="250" text-anchor="middle" class="label">Chat UI / chatStore</text>
    <text x="385" y="282" text-anchor="middle" class="mono">{ message, history, sessionId }</text>

    <rect x="865" y="205" width="380" height="115" rx="12" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
    <text x="1055" y="250" text-anchor="middle" class="label">HTTP request</text>
    <text x="1055" y="282" text-anchor="middle" class="mono">POST /api/ai/agent-chat</text>

    <line x1="635" y1="262" x2="855" y2="262" class="arrowBlue"/>
    <line x1="750" y1="380" x2="750" y2="445" class="arrow"/>

    <rect x="60" y="445" width="1380" height="1330" rx="14" fill="#f8fbff" stroke="#2563eb" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="750" y="492" text-anchor="middle" class="section" fill="#1d4ed8">Backend (Express 5)</text>

    <rect x="150" y="525" width="1200" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="750" y="568" text-anchor="middle" class="label" fill="#1e40af">Express xác thực JWT (protect middleware)</text>
    <line x1="750" y1="595" x2="750" y2="645" class="arrow"/>

    <rect x="215" y="645" width="1070" height="86" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="750" y="681" text-anchor="middle" class="label">Lưu tin nhắn user vào MongoDB</text>
    <text x="750" y="710" text-anchor="middle" class="small">Thực hiện khi request có sessionId</text>
    <line x1="750" y1="731" x2="750" y2="780" class="arrow"/>

    <rect x="215" y="780" width="1070" height="86" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="750" y="816" text-anchor="middle" class="label">Lấy thông tin người dùng</text>
    <text x="750" y="845" text-anchor="middle" class="small">username, displayName để cá nhân hoá phản hồi</text>
    <line x1="750" y1="866" x2="750" y2="925" class="arrow"/>

    <rect x="405" y="925" width="690" height="150" rx="12" fill="#fff7ed" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="750" y="963" text-anchor="middle" class="label" fill="#92400e">Intent Detection qua keyword matching</text>
    <text x="750" y="1000" text-anchor="middle" class="tiny">"tìm", "search", "tìm kiếm" → search</text>
    <text x="750" y="1027" text-anchor="middle" class="tiny">"gợi ý", "đề xuất", "recommend" → recommend</text>
    <text x="750" y="1054" text-anchor="middle" class="tiny">"tóm tắt", "summarize", "tổng quan" → summarize; còn lại → chat</text>

    <path d="M750 1075 C750 1110, 325 1100, 325 1160" class="arrow"/>
    <path d="M750 1075 C750 1110, 750 1100, 750 1160" class="arrow"/>
    <path d="M750 1075 C750 1110, 1175 1100, 1175 1160" class="arrow"/>

    <rect x="140" y="1160" width="370" height="245" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.3"/>
    <text x="325" y="1198" text-anchor="middle" class="label" fill="#166534">SEARCH Tool</text>
    <text x="170" y="1236" class="small">Regex matching trên:</text>
    <text x="190" y="1270" class="tiny">• Artwork: title, tags</text>
    <text x="190" y="1298" class="tiny">• User: username, displayName</text>
    <text x="190" y="1326" class="tiny">• Request: title</text>
    <text x="170" y="1366" class="small">Trả về artwork, user, plan, tag</text>

    <rect x="565" y="1160" width="370" height="245" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2.3"/>
    <text x="750" y="1198" text-anchor="middle" class="label" fill="#9a3412">RECOMMEND Tool</text>
    <text x="595" y="1236" class="small">Dựa trên bookmark:</text>
    <text x="615" y="1270" class="tiny">• Lấy tag từ artwork đã bookmark</text>
    <text x="615" y="1298" class="tiny">• Đếm tần suất → top 5 tag</text>
    <text x="615" y="1326" class="tiny">• Tìm artwork cùng tag</text>
    <text x="595" y="1366" class="small">Sắp xếp theo likeCount</text>

    <rect x="990" y="1160" width="370" height="245" rx="12" fill="#faf5ff" stroke="#9333ea" stroke-width="2.3"/>
    <text x="1175" y="1198" text-anchor="middle" class="label" fill="#6b21a8">SUMMARIZE Tool</text>
    <text x="1020" y="1236" class="small">Tóm tắt artwork:</text>
    <text x="1040" y="1270" class="tiny">• Trích artworkId bằng regex 24 hex</text>
    <text x="1040" y="1298" class="tiny">• Lấy thông tin từ MongoDB</text>
    <text x="1040" y="1326" class="tiny">• Trả về title, description, type</text>
    <text x="1040" y="1354" class="tiny">• tags, author, stats</text>

    <path d="M325 1405 C325 1455, 750 1445, 750 1495" class="arrow"/>
    <path d="M750 1405 L750 1495" class="arrow"/>
    <path d="M1175 1405 C1175 1455, 750 1445, 750 1495" class="arrow"/>

    <rect x="185" y="1495" width="1130" height="105" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="750" y="1532" text-anchor="middle" class="label" fill="#3730a3">Xây dựng system prompt cá nhân hoá</text>
    <text x="750" y="1564" text-anchor="middle" class="small">"Bạn là trợ lý nghệ thuật IlluWrl. Tên người dùng là {userName}..."</text>
    <line x1="750" y1="1600" x2="750" y2="1650" class="arrow"/>

    <rect x="185" y="1650" width="1130" height="95" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="750" y="1685" text-anchor="middle" class="label" fill="#1d4ed8">AI Service: chatWithAI() / chatStreamWithAI()</text>
    <text x="750" y="1716" text-anchor="middle" class="small">Có tool → gửi kết quả tool + yêu cầu giải thích | Không tool → gửi hội thoại trực tiếp</text>

    <line x1="750" y1="1745" x2="750" y2="1802" class="arrow"/>
  </g>

  <g class="font" transform="translate(90 1802)">
    <rect x="0" y="0" width="1320" height="78" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="2.5"/>
    <text x="660" y="31" text-anchor="middle" class="label" fill="#78350f">AI Provider qua AI_PROVIDER</text>
    <text x="330" y="60" text-anchor="middle" class="small">ollama → Ollama API (llama3.2:3b)</text>
    <text x="990" y="60" text-anchor="middle" class="small">openai → OpenAI-compatible API (deepseek-chat)</text>
  </g>

  <g class="font">
    <path d="M90 1842 C30 1842, 30 610, 150 610" class="dash"/>
    <text x="53" y="1240" transform="rotate(-90 53 1240)" text-anchor="middle" class="tiny">Lưu assistant message, cập nhật title session nếu là tin nhắn đầu tiên</text>
    <path d="M1410 1842 C1470 1842, 1470 260, 1245 260" class="dash"/>
    <text x="1448" y="1055" transform="rotate(90 1448 1055)" text-anchor="middle" class="tiny">Trả về kết quả cho frontend</text>
  </g>
</svg>
